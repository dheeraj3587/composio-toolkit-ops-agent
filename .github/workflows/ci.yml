name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend, security, and providers
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ALLOW_LIVE_BROWSER: "false"
      ALLOW_LIVE_VENDOR_EMAIL: "false"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      RUN_LIVE_TESTS: "0"
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-providers.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Install local Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run backend and security gate
        run: ./scripts/security_gate.sh backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Run frontend gate
        run: ./scripts/security_gate.sh frontend
